<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https: //fonts.googleapis.com/css2?family= Noto + Sans:ital@1 & display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
    <header class="col-12 d-flex justify-content-center align-items-center" style="background-color: #df865a; height: 100px;">
        <button type="button" style="font-family: 'Noto Sans', sans-serif; background-color: #ff6416;"class="btn" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
            Click on me to start
          </button>
          
          <div class="modal fade " id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered ">
              <div class="modal-content "  style="background-color: #df865a;">
                <div class="modal-header">
                  <h5 class="modal-title" id="staticBackdropLabel">Введи код для получения подсказки</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <input type="text" placeholder="Сюда!"  style="background-color: #ff6416;">
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                  <button type="button" class="btn btn-primary" onclick=pm()>Enter</button>
                </div>
              </div>
            </div>
          </div>
    </header>
    

    <img src="dogPC.jpg" alt="" class="col-12 d-none d-lg-block">
    <img src="dogPCtele.jpg" alt="" class="col-12 d-none d-sm-block d-lg-none">
    <img src="dogTele2.jpg" alt="" class="col-12 d-block d-sm-none">

    <script src="java.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
