    <main>
        <div class="container">

                <p class="fs-3 col-lg-7 text-center" style="font-family: 'Varela Round', sans-serif;;">If you want to join the MonkeyRG team, fill out the questionnaire and wait for an answer</p>
            </div>
            <div class="formDiv d-flex justify-content-center align-items-center row" style="border: 1px solid grey; border-radius: 10px;">
                <form action="" class="d-flex flex-column mt-5 mb-5">
                    <div class="d-flex">
                        <div class="col-lg-1 d-none d-lg-block"></div>
                        <div class="col-lg-8 ">
                            <label for="NameZone1" class="form-label">Enter your first and last name</label>
                            <input type="text" tabindex="1" placeholder="No name." class="form-control" id="NameZone1" aria-describedby="emailHelp">
                        </div>
                    </div>
                    <div class="d-flex mt-4">
                        <div class="col-lg-1 d-none d-lg-block"></div>
                        <div class="col-lg-8">
                            <label for="EmailZone1" class="form-label">Enter your Email address</label>
                            <input type="email" tabindex="1" placeholder="This is a required input field." class="form-control" id="EmailZone1" aria-describedby="emailHelp">
                        </div>
                    </div>
                    <div class="form-check d-flex mt-3">
                        <div class="col-lg-1 d-none d-lg-block"></div>
                        <input type="checkbox" class="form-check-input ms-1" id="noRobot1">
                        <label class="form-check-label ms-2" for="noRobot1">I'm not a robot</label>
                    </div>
                    <div class="d-flex mt-3">
                        <div class="col-lg-1 d-none d-lg-block"></div>
                        <button type="submit" class="btn btn-primary col-lg-2">Submit</button>
                    </div>
                </form>
            </div>
